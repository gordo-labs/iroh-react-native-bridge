name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/iroh_mobile_bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
