name: CI

on:
  push:
    branches: [main, epic/react-native-package]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/iroh_mobile_bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  package:
    name: React Native package dry run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm pack --dry-run
