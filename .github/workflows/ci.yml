name: CI

on:
  push:
    branches: [main, epic/react-native-package]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/iroh_mobile_bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  package:
    name: React Native source package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-native/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run test:source
      - run: npm audit --omit=dev --audit-level=high

  repository-safety:
    name: Repository safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-repository-safety.mjs
