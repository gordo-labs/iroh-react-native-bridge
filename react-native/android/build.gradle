buildscript {
  if (project == rootProject) {
    repositories {
      google()
      mavenCentral()
    }
    dependencies {
      classpath("com.android.tools.build:gradle:8.8.2")
      classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
    }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

def getExtOrIntegerDefault(name, fallback) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

android {
  namespace "design.gordo.musichub.iroh"
  compileSdkVersion getExtOrIntegerDefault('compileSdkVersion', 35)

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault('minSdkVersion', 24)
    targetSdkVersion getExtOrIntegerDefault('targetSdkVersion', 35)
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
}
